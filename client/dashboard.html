<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hive-Mind dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="./assets/logout.js" defer></script>
    <script src="./assets/board.js" defer></script>
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <div class="overlay">
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
        <a class="navbar-brand fw-bold" href="#">Hive-Minds</a>

        <div class="ms-auto">
          <button id="logout" class="btn btn-outline-light me-2">Logout</button>
        </div>
      </nav>

      <!-- Main Content -->
      <div class="container text-center mt-5">
        <h2 id="welcomeMessage">Welcome, Student</h2>

        <p class="mt-3">Ready to test your knowledge?</p>

        <div class="mt-4">
          <button id="startGame" class="btn btn-primary me-3">
            Start Game
          </button>
          <button id="leaderboard" class="btn btn-success">
            View Leaderboard
          </button>
        </div>
      </div>
    </div>

    <footer class="footer">
      <p>© 2026 Hive-Minds | Built for smart learning</p>
    </footer>
  </body>
</html>
