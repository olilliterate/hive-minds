<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hive-Mind dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/style.css" />
    <script src="./assets/logout.js" defer></script>
    <script src="./assets/board.js" defer></script>
    <script src="./assets/leaderboard.js" defer></script>
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Hive-Mind dashboard</title>
        <link
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet"
        />
        <script src="./assets/logout.js" defer></script>
        <script src="./assets/board.js" defer></script>
        <script src="./assets/leaderboard.js" defer></script>
        <script src="./assets/game.js"></script>
        <link rel="stylesheet" href="./assets/style.css" />
      </head>
      <body>
        <div class="overlay">
          <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
            <a class="navbar-brand fw-bold" href="#">Hive-Minds</a>

            <div class="ms-auto">
              <button id="logout" class="btn btn-outline-light me-2">
                Logout
              </button>
            </div>
          </nav>

          <!-- Main Content -->
          <div class="container text-center mt-5">
            <h2 id="welcomeMessage">Welcome, Student</h2>

            <p class="mt-3">Ready to test your knowledge?</p>
            <!-----------Game section--------------->

            <div class="mt-4">
              <button id="startGame" class="btn btn-primary me-3">
                Start Game
              </button>
              <button id="leaderboard" class="btn btn-primary me-3">
                Leaderboard
              </button>
              <!-- LEADERBOARD SECTION -->
              <div id="leaderboardSection" class="container mt-5 d-none">
                <div class="card shadow-lg">
                  <div class="card-header bg-success text-white">
                    <h4 class="mb-0">🏆 Leaderboard</h4>
                  </div>

                  <div class="card-body">
                    <div id="leaderboardList" class="list-group">
                      <!-- dynamic content -->
                    </div>
                  </div>

                  <div class="card-footer text-end">
                    <button
                      id="closeLeaderboard"
                      class="btn btn-secondary btn-sm"
                    >
                      Close
                    </button>
                  </div>
                </div>
              </div>
            </div>
            <div class="game-board d-none"></div>
            <!--where our game will be played-->
          </div>
        </div>

        <footer class="footer">
          <p>© 2026 Hive-Minds | Built for smart learning</p>
        </footer>
      </body>
    </html>
  </head>
</html>
