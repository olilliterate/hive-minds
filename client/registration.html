<!doctype html>
<html>
  <head>
    <title>Hive-Minds Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="./assets/registration.js" defer></script>
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
      <a class="navbar-brand fw-bold" href="#">Hive-Minds</a>
    </nav>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card p-4 shadow">
            <h3 class="text-center mb-3">Create Account</h3>

            <form id="registerForm">
              <div class="row">
                <div class="col">
                  <label class="form-label">First Name</label>
                  <input type="text" id="firstName" class="form-control" />
                  <div class="invalid-feedback" id="firstNameError"></div>
                </div>

                <div class="col">
                  <label class="form-label">Last Name</label>
                  <input type="text" id="lastName" class="form-control" />
                  <div class="invalid-feedback" id="lastNameError"></div>
                </div>
              </div>

              <label class="form-label">School Email</label>
              <input type="email" id="email" class="form-control mb-1" />
              <div class="invalid-feedback" id="emailError"></div>

              <label class="form-label mt-3">Password</label>
              <input type="password" id="password" class="form-control mb-1" />
              <div class="invalid-feedback" id="passwordError"></div>

              <label class="form-label mt-3">School Name</label>
              <input type="text" id="school" class="form-control mb-1" />
              <div class="invalid-feedback" id="schoolError"></div>

              <label class="form-label mt-3">Class / Year Group</label>
              <input type="text" id="className" class="form-control mb-1" />
              <div class="invalid-feedback" id="classError"></div>

              <div class="mt-3">
                <label class="form-label">Role</label><br />
                <input type="radio" name="role" value="student" checked />
                Student
                <input type="radio" name="role" value="teacher" class="ms-3" />
                Teacher
              </div>

              <button class="btn btn-success w-100 mt-3">Register</button>
            </form>

            <p class="text-center mt-3">
              Already have an account? <a href="login.html">Login</a>
            </p>
          </div>
        </div>
      </div>
    </div>
    <footer class="footer">
      <p>© 2026 Hive-Minds | Built for smart learning</p>
    </footer>
  </body>
</html>
